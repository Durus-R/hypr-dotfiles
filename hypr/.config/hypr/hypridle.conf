general {
    lock_cmd = pidof hyprlock || hyprlock       # Was passiert beim Locken?
    before_sleep_cmd = loginctl lock-session    # Bevor der PC schläft -> Locken
    after_sleep_cmd = hyprctl dispatch dpms on  # Nach dem Aufwachen -> Bildschirm an
}

listener {
    timeout = 300                                # 5 Minuten Inaktivität
    on-timeout = loginctl lock-session && brightnessctl --device='asus::kbd_backlight' s 50          # -> Lockscreen an
    on-resume = brightnessctl --device='asus::kbd_backlight' s 100      
}

listener {
    timeout = 600                                # 10 Minuten Inaktivität
    on-timeout = hyprctl dispatch dpms off   && brightnessctl --device='asus::kbd_backlight' s 0    # -> Bildschirm aus
    on-resume = hyprctl dispatch dpms on    && brightnessctl --device='asus::kbd_backlight' s 100     # -> Bildschirm an bei Bewegung
}
